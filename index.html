<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>技能树 · CrossFit Gymnastics</title>
<style>
:root{
  --bg:#0C0F14;
  --surface:#151A22;
  --surface2:#1C232E;
  --surface3:#242D3A;
  --line:#222B37;
  --text:#E8EDF2;
  --dim:#8B95A3;
  --faint:#5A6470;
  --green:#50E3A4;
  --green-deep:#1E5C43;
  --blue:#6CA8FF;
  --amber:#F5B14C;
  --rose:#F2697A;
  --violet:#B08CFF;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace;
  --sans:-apple-system,"PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif;
  --r-lg:20px; --r-md:14px; --r-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  min-height:100vh;padding-bottom:96px;
  background-image:radial-gradient(ellipse 80% 40% at 50% -10%, rgba(80,227,164,.06), transparent);
}
.app{max-width:560px;margin:0 auto;padding:20px 16px 0}

/* ====== 顶部 ====== */
.masthead{display:flex;align-items:baseline;justify-content:space-between;margin:8px 2px 18px}
h1{font-size:34px;font-weight:900;letter-spacing:1px}
.masthead .en{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:2px;text-transform:uppercase}

/* ====== 视图切换 ====== */
.viewtabs{display:flex;background:var(--surface);border-radius:99px;padding:4px;margin-bottom:16px;border:1px solid var(--line)}
.viewtabs button{
  flex:1;border:none;background:transparent;color:var(--dim);font-size:15px;font-weight:600;
  padding:10px 0;border-radius:99px;cursor:pointer;font-family:var(--sans);transition:all .25s;
}
.viewtabs button.on{background:var(--surface3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.35)}

/* ====== 过滤器 ====== */
.filters{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.chiprow{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px}
.chiprow::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--line);color:var(--dim);
  border-radius:99px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:var(--sans);white-space:nowrap;
}
.chip .n{font-family:var(--mono);font-size:12px}
.chip.on{background:var(--green);border-color:var(--green);color:#06281A}
.chip.on .dot,.chip.on .n{color:#06281A}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* ====== 分类卡片 ====== */
.catcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden}
.cathead{display:flex;align-items:center;gap:14px;padding:18px 18px 14px;cursor:pointer;user-select:none}
.catring{position:relative;width:52px;height:52px;flex-shrink:0}
.catring svg{transform:rotate(-90deg)}
.catring .icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.catinfo{flex:1;min-width:0}
.catinfo .zh{font-size:19px;font-weight:800}
.catinfo .en{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.catcount{font-family:var(--mono);font-size:14px;color:var(--dim)}
.caret{color:var(--faint);transition:transform .3s;margin-left:6px}
.catcard.closed .caret{transform:rotate(-90deg)}
.catbody{transition:none}
.catcard.closed .catbody{display:none}

/* ====== 子类分组 ====== */
.subhead{
  display:flex;align-items:center;gap:8px;padding:12px 18px 6px;
  font-size:13px;font-weight:700;color:var(--dim);
}
.subhead .n{font-family:var(--mono);color:var(--faint);font-weight:400}

/* ====== 动作行 ====== */
.move{
  display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;
  border-top:1px solid var(--line);transition:background .15s;
}
.move:active{background:var(--surface2)}
.statusbtn{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;border:2px solid var(--faint);
  background:transparent;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .25s;position:relative;
}
.statusbtn.mastered{background:var(--green);border-color:var(--green);color:#06281A}
.statusbtn.learning{background:transparent;border-color:var(--blue);color:var(--blue)}
.statusbtn.want{border-color:var(--amber);color:var(--amber)}
.movemain{flex:1;min-width:0}
.moveline1{display:flex;align-items:center;gap:8px}
.lvl{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.5px}
.lvl.L1{background:rgba(80,227,164,.15);color:var(--green)}
.lvl.L2{background:rgba(108,168,255,.15);color:var(--blue)}
.lvl.L3{background:rgba(245,177,76,.15);color:var(--amber)}
.lvl.L4{background:rgba(242,105,122,.18);color:var(--rose)}
.movezh{font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.moveen{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.movemeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.logcount{font-family:var(--mono);font-size:11px;color:var(--faint)}
.move .arrow{color:var(--faint);font-size:18px}

/* ====== 进阶路径视图 ====== */
.pathcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:16px;padding:20px 18px}
.pathtitle{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.pathtitle .zh{font-size:18px;font-weight:800}
.pathtitle .pct{font-family:var(--mono);font-size:13px;color:var(--green)}
.pathdesc{font-size:13px;color:var(--dim);margin-bottom:18px;line-height:1.6}
.chain{position:relative;padding-left:8px}
.chainnode{display:flex;align-items:center;gap:14px;position:relative;padding:10px 0;cursor:pointer}
.chainnode .rail{
  position:absolute;left:14px;top:-50%;height:100%;width:3px;background:var(--line);z-index:0;border-radius:2px;
}
.chainnode:first-child .rail{display:none}
.chainnode .rail.done{background:var(--green)}
.nodedot{
  width:30px;height:30px;border-radius:50%;background:var(--surface);border:2.5px solid var(--faint);
  z-index:1;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:all .3s;
}
.nodedot.mastered{background:var(--green);border-color:var(--green);color:#06281A;box-shadow:0 0 14px rgba(80,227,164,.4)}
.nodedot.learning{border-color:var(--blue);color:var(--blue);box-shadow:0 0 12px rgba(108,168,255,.3)}
.nodedot.next{border-color:var(--amber);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,177,76,.35)}50%{box-shadow:0 0 0 8px rgba(245,177,76,0)}}
.nodetext .zh{font-size:15px;font-weight:700}
.nodetext .en{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px}
.nodetag{margin-left:auto;font-size:11px;font-family:var(--mono);color:var(--faint)}
.nodetag.next{color:var(--amber)}

/* ====== 详情抽屉 ====== */
.sheetmask{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.sheetmask.show{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:51;max-width:560px;margin:0 auto;
  background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--line);border-bottom:none;
  max-height:88vh;overflow-y:auto;transform:translateY(105%);transition:transform .35s cubic-bezier(.3,1,.3,1);
  overscroll-behavior:contain;
}
.sheet.show{transform:translateY(0)}
.grab{width:40px;height:4px;border-radius:2px;background:var(--faint);margin:12px auto 0;opacity:.5}
.sheetinner{padding:18px 22px 40px}
.sheethead{margin-bottom:6px}
.sheethead .toprow{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sheethead h2{font-size:24px;font-weight:900}
.sheethead .en{font-family:var(--mono);font-size:13px;color:var(--faint);letter-spacing:1px}
.statusrow{display:flex;gap:8px;margin:18px 0 6px}
.statusrow button{
  flex:1;border:1.5px solid var(--line);background:var(--surface2);color:var(--dim);
  border-radius:var(--r-sm);padding:11px 0;font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--sans);transition:all .2s;
}
.statusrow button.on-want{border-color:var(--amber);color:var(--amber);background:rgba(245,177,76,.1)}
.statusrow button.on-learning{border-color:var(--blue);color:var(--blue);background:rgba(108,168,255,.1)}
.statusrow button.on-mastered{border-color:var(--green);color:#06281A;background:var(--green)}

/* 教材区块 */
.tut{margin-top:20px}
.tutsec{margin-bottom:20px}
.tutsec h3{
  display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;margin-bottom:10px;
  color:var(--text);
}
.tutsec h3 .bar{width:4px;height:15px;border-radius:2px;background:var(--green)}
.tutsec h3 .bar.b{background:var(--blue)} .tutsec h3 .bar.a{background:var(--amber)}
.tutsec h3 .bar.r{background:var(--rose)} .tutsec h3 .bar.v{background:var(--violet)}
.tutsec p{font-size:14px;line-height:1.85;color:#C3CBD6}
.steps{counter-reset:s;display:flex;flex-direction:column;gap:10px}
.steps li{
  list-style:none;counter-increment:s;display:flex;gap:12px;font-size:14px;line-height:1.75;color:#C3CBD6;
}
.steps li::before{
  content:counter(s);font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);
  width:24px;height:24px;border:1.5px solid var(--green-deep);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
  background:rgba(80,227,164,.08);
}
.cues{display:flex;flex-direction:column;gap:8px}
.cues li{list-style:none;display:flex;gap:10px;font-size:14px;line-height:1.7;color:#C3CBD6}
.cues li::before{content:"·";color:var(--blue);font-weight:900;font-size:20px;line-height:1.2}
.faults li::before{content:"×";color:var(--rose);font-weight:900;font-size:15px;line-height:1.6}
.stdbox{
  background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-md);
  padding:14px 16px;font-size:14px;line-height:1.8;color:#C3CBD6;
}
.stdbox b{color:var(--green)}

/* 打卡记录 */
.logsec{margin-top:26px;border-top:1px dashed var(--line);padding-top:20px}
.logsec h3{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.logsec h3 .n{font-family:var(--mono);font-size:12px;color:var(--faint);font-weight:400}
.logform{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.logform textarea{
  background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);
  color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 13px;resize:none;height:64px;
  outline:none;line-height:1.6;
}
.logform textarea:focus{border-color:var(--green-deep)}
.feelrow{display:flex;gap:8px}
.feelrow button{
  flex:1;background:var(--surface2);border:1.5px solid var(--line);color:var(--dim);border-radius:var(--r-sm);
  padding:9px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;
}
.feelrow button.on{border-color:var(--green);color:var(--green);background:rgba(80,227,164,.08)}
.logsave{
  background:var(--green);border:none;color:#06281A;font-weight:800;font-size:15px;
  border-radius:var(--r-sm);padding:12px 0;cursor:pointer;font-family:var(--sans);transition:transform .1s;
}
.logsave:active{transform:scale(.98)}
.logitem{display:flex;gap:12px;padding:11px 0;border-top:1px solid var(--line);font-size:13px}
.logitem .d{font-family:var(--mono);color:var(--faint);flex-shrink:0;font-size:12px;padding-top:1px}
.logitem .t{color:#C3CBD6;line-height:1.6;flex:1}
.logitem .f{flex-shrink:0;font-size:12px}
.logdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 2px}

/* ====== 记录视图 ====== */
.daycard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:12px;padding:16px 18px}
.daycard .d{font-family:var(--mono);font-size:13px;color:var(--green);margin-bottom:10px;font-weight:700}
.daycard .ent{display:flex;gap:10px;font-size:14px;line-height:1.7;color:#C3CBD6;padding:4px 0}
.daycard .ent b{color:var(--text);flex-shrink:0}

/* ====== 我的视图 ====== */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.statbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:18px}
.statbox .v{font-family:var(--mono);font-size:30px;font-weight:700}
.statbox .k{font-size:13px;color:var(--dim);margin-top:4px}
.statbox.g .v{color:var(--green)} .statbox.b .v{color:var(--blue)}
.statbox.a .v{color:var(--amber)} .statbox.p .v{color:var(--violet)}
.badgegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  padding:16px 10px;text-align:center;transition:all .3s;
}
.badge .ic{font-size:26px;filter:grayscale(1);opacity:.3;transition:all .4s}
.badge .nm{font-size:12px;font-weight:700;margin-top:8px;color:var(--faint)}
.badge .cond{font-size:10px;color:var(--faint);margin-top:3px;font-family:var(--mono)}
.badge.unlocked{border-color:var(--green-deep);background:linear-gradient(180deg,rgba(80,227,164,.07),var(--surface))}
.badge.unlocked .ic{filter:none;opacity:1}
.badge.unlocked .nm{color:var(--text)}
.databtns{display:flex;gap:10px;margin-top:18px}
.databtns button{
  flex:1;background:var(--surface);border:1px solid var(--line);color:var(--dim);
  border-radius:var(--r-sm);padding:12px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);
}
.sectionlabel{font-size:14px;font-weight:800;margin:22px 4px 12px;color:var(--text)}

/* ====== 底部导航 ====== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:rgba(18,23,30,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);
}
.tabbar .inner{max-width:560px;margin:0 auto;display:flex;padding:8px 0 calc(10px + env(safe-area-inset-bottom))}
.tabbar button{
  flex:1;background:none;border:none;color:var(--faint);font-size:11px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:var(--sans);padding:4px 0;
}
.tabbar button .ic{font-size:21px;transition:transform .2s}
.tabbar button.on{color:var(--green)}
.tabbar button.on .ic{transform:translateY(-2px)}

/* ====== 庆祝动效 ====== */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:fall 1.5s ease-out forwards}
@keyframes fall{
  0%{transform:translate(0,0) rotate(0);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}
}
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--green);color:#06281A;font-weight:800;font-size:15px;
  padding:13px 26px;border-radius:99px;z-index:100;transition:transform .4s cubic-bezier(.3,1.4,.5,1);
  box-shadow:0 8px 30px rgba(80,227,164,.35);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--faint);font-size:14px;padding:50px 0;line-height:2}
.empty .big{font-size:36px}

/* ====== 扩展:动作演示动画 ====== */
.illus{
  background:linear-gradient(180deg,var(--surface2),var(--surface));
  border:1px solid var(--line);border-radius:var(--r-md);
  padding:10px 12px 6px;margin:16px 0 4px;
}
.illus svg{width:100%;height:auto;display:block;max-height:210px}
.ifl{fill:none;stroke:var(--text);stroke-width:3.6;stroke-linecap:round;stroke-linejoin:round}
.ifh{fill:var(--surface);stroke:var(--text);stroke-width:3.2}
.ifg{fill:var(--green)}
.ip{stroke:#39424F;stroke-width:3;stroke-linecap:round}
.ipb{stroke:#4A5562;stroke-width:4.5;stroke-linecap:round}
.ipr{fill:none;stroke:#4A5562;stroke-width:3}
.ipf{fill:#2A3340}
.ghost .ifl,.ghost .ifh{stroke:var(--faint);opacity:.22}
.ghost .ifh{fill:none}
.illuscap{
  text-align:center;font-size:12px;color:var(--dim);padding:6px 0 4px;
}
.illuscap .ab{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:6px;letter-spacing:1px}

/* ====== 扩展:WOD ====== */
.wodinput{
  background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);
  color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 13px;outline:none;width:100%;
}
.wodinput:focus{border-color:var(--green-deep)}
.wodpre{
  white-space:pre-wrap;word-break:break-word;font-family:var(--mono);font-size:12.5px;line-height:1.8;
  color:#C3CBD6;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:12px 14px;margin:10px 0;
}
.wodbtn{
  width:100%;background:var(--green);border:none;color:#06281A;font-weight:800;font-size:14px;
  border-radius:var(--r-sm);padding:12px 0;cursor:pointer;font-family:var(--sans);margin-top:8px;
}
.wodbtn:disabled{opacity:.6}
.ghostbtn{background:var(--surface2);color:var(--dim);border:1px solid var(--line);font-weight:600}
.photobar{display:flex;gap:10px}
.photobar label{padding:10px 0;font-size:13px;cursor:pointer;border-radius:var(--r-sm)}
.wodimg{
  width:86px;height:86px;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--line);
  cursor:zoom-in;display:block;margin-top:8px;transition:all .25s;
}
.wodimg.zoomed{width:100%;height:auto;cursor:zoom-out}
.glossbox,.zhbox{
  background:var(--surface2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:12px 14px;margin:10px 0;
}
.glosstitle{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:8px;letter-spacing:.5px}
.glossrow{display:flex;gap:10px;font-size:12.5px;line-height:1.9}
.glossrow b{font-family:var(--mono);color:var(--text);flex-shrink:0;min-width:92px;font-size:12px}
.glossrow span{color:var(--dim)}


.ifp{fill:rgba(80,227,164,.07);stroke:#4A5562;stroke-width:3}
.ifp2{fill:#5A6470}
.ghost .ifp{opacity:.18}

.ifk{fill:#39424F;stroke:#5A6470;stroke-width:2.5}
.ifb{fill:rgba(108,168,255,.15);stroke:#6CA8FF;stroke-width:2.5}
.ghost .ifk,.ghost .ifb{opacity:.18}

/* 扩展5:哑铃 + UX */
.ifd{fill:#39424F;stroke:#5A6470;stroke-width:2}
.ghost .ifd{opacity:.18}
.overall{margin:2px 2px 14px}
.ovtext{display:flex;align-items:baseline;gap:6px;font-size:13px;color:var(--dim);margin-bottom:7px}
.ovtext b{font-family:var(--mono);font-size:18px;color:var(--green)}
.ovpct{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
.ovbar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden}
.ovfill{height:100%;border-radius:3px;background:var(--green);transition:width .6s cubic-bezier(.3,1,.3,1)}
.searchwrap{position:relative;display:flex;align-items:center}
.searchwrap .sicon{position:absolute;left:14px;color:var(--faint);font-size:16px;pointer-events:none}
.searchwrap input{
  width:100%;background:var(--surface);border:1px solid var(--line);border-radius:99px;
  color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 40px 11px 38px;outline:none;
}
.searchwrap input:focus{border-color:var(--green-deep)}

<script>
// ================= 动作数据库 =================
// status: none / want / learning / mastered
const CATEGORIES = [
  {id:"gym", zh:"体操", en:"Gymnastics", icon:"🤸"},
];
const SUBCATS = ["拉类","推类","倒立类","核心与保持"];
const LEVELS = {L1:"入门",L2:"基础",L3:"进阶",L4:"高阶"};

const MOVES = [
// ---------------- 拉类 ----------------
{id:"dead-hang",cat:"gym",sub:"拉类",lvl:"L1",zh:"死悬",en:"Dead Hang",
 goal:"建立握力、肩部和肘部结缔组织的基础承重能力,是一切悬垂类动作的地基。",
 steps:["正握单杠,双手与肩同宽或略宽,拇指环绕握(full grip)。","双脚离地,身体完全放松下沉,肩胛骨自然上提,耳朵贴近上臂。","保持呼吸均匀,不要憋气,目视前方。","下杠时双脚先落地缓冲,不要直接松手摔落。"],
 cues:["全程拇指锁握,不要虚握(suicide grip)","身体放松但不松垮,核心微收防止过度晃动","肩部允许被动拉长,这正是训练目的"],
 faults:["耸肩发力对抗重力——死悬就是要被动悬挂","握距过宽导致肩部不适","时间未到就频繁换握或扭动身体"],
 std:"单次悬挂 <b>60 秒</b> 不落地,即可解锁下一步。进阶者目标 90–120 秒。",
 next:"达标后进入「主动悬挂」,学习用肩胛下沉控制身体。"},

{id:"active-hang",cat:"gym",sub:"拉类",lvl:"L1",zh:"主动悬挂",en:"Active Hang",
 goal:"学会在悬挂中下沉并锁定肩胛骨,建立肩部主动稳定能力,是引体向上发力的起点。",
 steps:["从死悬姿势开始,保持手肘伸直。","想象「把肩膀塞进口袋」,肩胛骨向下、向后沉,耳朵与肩膀之间拉出空间。","胸腔微微上提,身体形成轻微的空心体(hollow)张力。","保持 10–20 秒后还原到死悬,感受两种状态的区别。"],
 cues:["手肘始终伸直——弯肘就变成了引体","肋骨下收,不要塌腰挺肚子","下沉的是肩胛,不是低头缩脖子"],
 faults:["用弯曲手肘代替肩胛下沉","耸肩状态误以为是主动悬挂","身体大幅摆动失去张力"],
 std:"主动悬挂稳定保持 <b>30 秒</b>,且能连续完成 10 次「死悬↔主动悬挂」切换(肩胛引体)。",
 next:"进入「肩胛引体」强化,再开始严格引体向上的离心阶段训练。"},

{id:"ring-row",cat:"gym",sub:"拉类",lvl:"L1",zh:"吊环划船",en:"Ring Row",
 goal:"用可调节角度的水平拉建立背阔肌、菱形肌和二头肌力量,是严格引体最重要的辅助动作。",
 steps:["双手抓环,身体后倾呈直线,脚跟着地,环带越垂直难度越高。","起始位手臂伸直,肩胛微收,全身像一块平板。","拉动身体使双环触碰胸口两侧,手肘贴近身体后拉。","顶端停顿 1 秒,挤压肩胛,然后用 2–3 秒缓慢还原。"],
 cues:["身体是一条直线:夹臀、收腹、头中立","先收肩胛再弯手肘,顺序不能反","调整脚的位置改变难度——脚越靠前越难"],
 faults:["臀部下垂或上顶,身体变成香蕉形","顶端拉不到位,手肘只弯到 90°","用甩腰的惯性代替背部发力"],
 std:"身体接近水平角度时完成 <b>3 组 × 12 次</b> 标准划船,触胸且 2 秒离心。",
 next:"配合「主动悬挂」达标后,开始严格引体向上的弹力带辅助训练。"},

{id:"pull-over",cat:"gym",sub:"拉类",lvl:"L2",zh:"拉过杠",en:"Pull-over",
 goal:"综合拉力、核心折叠与杠上转换能力,培养「绕杠旋转」的本体感觉,为双力臂打基础。",
 steps:["主动悬挂起始,拉杠的同时膝盖收向胸口,身体后倒。","髋部持续上送,让腹部贴近杠面,双腿越过杠的上方。","身体绕杠旋转,转到杠上支撑位(front support),手腕翻转压在杠上。","控制还原:身体前倾绕杠向下,缓慢回到悬挂。"],
 cues:["拉杠+收腹+后倒三个动作同时启动","眼睛看脚尖帮助身体后翻","转到杠上后立即伸直手臂锁定支撑"],
 faults:["只用手臂拉,髋部没有上送,卡在半空","头向后仰导致旋转轴偏移","落杠时腹部砸杠——应该是贴着滚上去"],
 std:"无助力连续完成 <b>3 次</b> 流畅拉过杠,上杠后能稳定支撑 3 秒。",
 next:"杠上支撑感建立后,可以开始接触双力臂的过渡(transition)分解练习。"},

{id:"strict-pullup",cat:"gym",sub:"拉类",lvl:"L2",zh:"严格引体向上",en:"Strict Pull-up",
 goal:"上肢拉力的金标准。建立真实的垂直拉力量,是所有 kipping 动作的安全前提——先有力量,再加摆动。",
 steps:["主动悬挂起始,肩胛先下沉锁定。","手肘向髋部方向拉,带动身体垂直上升,想象「把杠拉向胸口」。","下巴明确高于杠面(标准)或锁骨触杠(更高标准)。","用 2 秒控制下放,回到手肘完全伸直的悬挂位,每一次都从直臂开始。"],
 cues:["启动顺序:肩胛下沉 → 手肘后拉 → 下巴过杠","全程保持轻微空心体,脚尖并拢绷直","想着「手肘插口袋」而不是「下巴够杠」"],
 faults:["半程引体:底部手肘不伸直,顶部下巴不过杠","蹬腿、甩髋借力(那是 kipping,不是 strict)","脖子拼命前伸够杠,肩颈代偿"],
 std:"男性 <b>5 次</b> / 女性 <b>3 次</b> 全程严格引体为达标线;CrossFit 训练建议达到男 10 / 女 5 再系统学习 kipping。",
 next:"达标后兵分两路:学习「Kipping 引体」提高竞技效率,或加负重继续发展绝对力量。"},

{id:"kipping-pullup",cat:"gym",sub:"拉类",lvl:"L3",zh:"Kipping 引体向上",en:"Kipping Pull-up",
 goal:"利用全身摆动(kip)将水平动能转化为垂直位移,在 WOD 中以更低的局部疲劳完成大量引体。前提:严格引体已达标。",
 steps:["先掌握杠下摆荡(beat swing):在「弓形 arch」与「空心 hollow」之间流畅切换,肩膀主导,不是踢腿。","在 hollow 前摆的瞬间,向下压杠并送髋,身体借势上升。","髋部驱动 + 手臂快速拉,下巴过杠。","推杠让身体后离,顺势回到 arch 位,直接衔接下一次摆荡。"],
 cues:["摆荡来自肩部推拉杠,腿只是跟随","「踢-拉-推」三拍节奏,推杠下放是衔接下一个的关键","身体始终保持张力,松散的摆动既低效又伤肩"],
 faults:["没有严格引体力量就练 kipping——肩部受伤高发原因","摆荡幅度失控,节奏断裂每次都要重新起摆","顶端不推杠,垂直掉落导致肩部受冲击"],
 std:"连续 <b>10 次</b> 不间断、节奏一致的 kipping 引体,组间身体不落杠。",
 next:"节奏稳定后学习「蝶式引体」,或横向发展「胸触杠引体」。"},

{id:"butterfly-pullup",cat:"gym",sub:"拉类",lvl:"L3",zh:"蝶式引体向上",en:"Butterfly Pull-up",
 goal:"竞技级最高效的引体形态:身体走圆形轨迹无停顿循环,比 kipping 更快,但对节奏与肩部控制要求极高。",
 steps:["从 kipping 的基础上改变轨迹:下巴过杠后身体不向后推,而是继续向前、向下画圆。","下落时双腿后摆进入 arch,几乎无停顿地衔接下一次上拉。","身体像在杠子周围画一个连续的椭圆,头和肩在杠前杠后交替。","用小幅度、高频率的循环维持节奏,呼吸跟随节拍。"],
 cues:["先用单次「kipping 上 + 蝶式轨迹下」练习过渡","目光固定一点,帮助维持节奏","越累越要保持轨迹圆滑,变形就主动断组"],
 faults:["轨迹变成上下直线,失去圆形动能","下落阶段完全放松,肩部被动受力","为追求速度牺牲下巴过杠的有效次数"],
 std:"连续 <b>15 次</b> 蝶式引体,全程节奏均匀无断点,下巴每次明确过杠。",
 next:"蝶式稳定后可挑战「蝶式胸触杠」,这是通往高水平竞技的标配。"},

function cnt(s,st){return Object.values(s.status).filter(v=>v===st).length}
function subDone(s,sub){return ALL.filter(m=>m.sub===sub).every(m=>s.status[m.id]==="mastered")}
function logTotal(s){return Object.values(s.logs).reduce((a,l)=>a+l.length,0)}

// ================= 状态持久化 =================
const KEY="cf-skilltree-v1";
let state={status:{},logs:{},badges:{},open:{gym:true}};
let storageOk=true;
try{
  const raw=localStorage.getItem(KEY);
  if(raw){const p=JSON.parse(raw);state={...state,...p,status:p.status||{},logs:p.logs||{},badges:p.badges||{}}}
}catch(e){storageOk=false}
function save(){
  if(!storageOk)return;
  try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}
}

// ================= 全局UI状态 =================
let tab="tree", treeView="moves", curMove=null, curFeel=null;
let filterStatus="all", filterSub="all", filterLvl="all";
const STATUS_META={
  none:{ic:"",label:"未开始"},
  want:{ic:"○",label:"想学"},
  learning:{ic:"🌙",label:"进行中"},
  mastered:{ic:"✓",label:"已掌握"},
};
const $=s=>document.querySelector(s);
const root=$("#viewroot");
const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ================= 渲染入口 =================
function render(){
  $("#pagetitle").textContent = tab==="tree"?"技能树":tab==="log"?"训练记录":"我的成就";
  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  if(tab==="tree") renderTree();
  else if(tab==="log") renderLog();
  else renderMe();
}

// ---------------- 技能树视图 ----------------
function renderTree(){
  const counts={
    all:ALL.length,
    mastered:cnt(state,"mastered"),
    learning:cnt(state,"learning"),
    want:cnt(state,"want"),
  };
  let html=`<div class="viewtabs">
    <button class="${treeView==="moves"?"on":""}" data-tv="moves">动作</button>
    <button class="${treeView==="paths"?"on":""}" data-tv="paths">进阶路径</button>
  </div>`;

  if(treeView==="moves"){
    html+=`<div class="filters">
      <div class="chiprow">
        ${chipS("all","全部",counts.all)}${chipS("mastered","✓ 已掌握",counts.mastered)}
        ${chipS("learning","🌙 进行中",counts.learning)}${chipS("want","○ 想学",counts.want)}
      </div>
      <div class="chiprow">
        ${chipSub("all","全部分类")}${SUBCATS.map(s=>chipSub(s,s)).join("")}
      </div>
      <div class="chiprow">
        ${chipL("all","全部难度")}${Object.entries(LEVELS).map(([k,v])=>chipL(k,`${k} · ${v}`)).join("")}
      </div>
    </div>`;
    html+=renderCats();
  }else{
    html+=PATHS.map(renderPath).join("");
  }
  root.innerHTML=html;
  bindTree();
}
const lvlColor={L1:"var(--green)",L2:"var(--blue)",L3:"var(--amber)",L4:"var(--rose)"};
function chipS(v,label,n){return `<button class="chip ${filterStatus===v?"on":""}" data-fs="${v}">${label} <span class="n">${n}</span></button>`}
function chipSub(v,label){return `<button class="chip ${filterSub===v?"on":""}" data-fsub="${v}">${v!=="all"?'<span class="dot" style="background:var(--blue)"></span>':""}${label}</button>`}
function chipL(v,label){return `<button class="chip ${filterLvl===v?"on":""}" data-fl="${v}">${v!=="all"?`<span class="dot" style="background:${lvlColor[v]}"></span>`:""}${label}</button>`}

function visibleMoves(){
  return ALL.filter(m=>{
    const st=state.status[m.id]||"none";
    if(filterStatus!=="all"&&st!==filterStatus)return false;
    if(filterSub!=="all"&&m.sub!==filterSub)return false;
    if(filterLvl!=="all"&&m.lvl!==filterLvl)return false;
    return true;
  });
}
function renderCats(){
  const vis=visibleMoves();
  return CATEGORIES.map(cat=>{
    const catMoves=ALL.filter(m=>m.cat===cat.id);
    const catVis=vis.filter(m=>m.cat===cat.id);
    const done=catMoves.filter(m=>state.status[m.id]==="mastered").length;
    const pct=catMoves.length?done/catMoves.length:0;
    const open=state.open[cat.id]!==false;
    const C=2*Math.PI*22;
    let body="";
    if(open){
      SUBCATS.forEach(sub=>{
        const subM=catVis.filter(m=>m.sub===sub);
        if(!subM.length)return;
        body+=`<div class="subhead"><span class="dot" style="background:var(--blue)"></span>${sub} <span class="n">· ${subM.length}</span></div>`;
        body+=subM.map(renderMoveRow).join("");
      });
      if(!catVis.length)body+=`<div class="empty">当前筛选下没有动作<br>试试放宽筛选条件</div>`;
    }
    return `<div class="catcard ${open?"":"closed"}" data-cat="${cat.id}">
      <div class="cathead" data-toggle="${cat.id}">
        <div class="catring">
          <svg width="52" height="52"><circle cx="26" cy="26" r="22" fill="none" stroke="var(--line)" stroke-width="4"/>
          <circle cx="26" cy="26" r="22" fill="none" stroke="var(--green)" stroke-width="4" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${C*(1-pct)}" style="transition:stroke-dashoffset .6s"/></svg>
          <div class="icon">${cat.icon}</div>
        </div>
        <div class="catinfo"><div class="zh">${cat.zh}</div><div class="en">${cat.en}</div></div>
        <div class="catcount">${done}/${catMoves.length}</div>
        <div class="caret">▾</div>
      </div>
      <div class="catbody">${body}</div>
    </div>`;
  }).join("");
}
function renderMoveRow(m){
  const st=state.status[m.id]||"none";
  const meta=STATUS_META[st];
  const logs=(state.logs[m.id]||[]).length;
  return `<div class="move" data-move="${m.id}">
    <button class="statusbtn ${st}" data-cycle="${m.id}" title="点击切换状态">${meta.ic}</button>
    <div class="movemain">
      <div class="moveline1"><span class="lvl ${m.lvl}">${m.lvl}</span><span class="movezh">${esc(m.zh)}</span></div>
      <div class="moveen">${esc(m.en)}</div>
    </div>
    <div class="movemeta">${logs?`<span class="logcount">打卡 ${logs}</span>`:""}<span class="arrow">›</span></div>
  </div>`;
}

function renderPath(p){
  const done=p.chain.filter(id=>state.status[id]==="mastered").length;
  let nextFound=false;
  const nodes=p.chain.map((id,i)=>{
    const m=byId[id];const st=state.status[id]||"none";
    const prevDone=i===0||state.status[p.chain[i-1]]==="mastered";
    const isNext=!nextFound&&st!=="mastered"&&prevDone;
    if(isNext)nextFound=true;
    const railDone=i>0&&state.status[p.chain[i-1]]==="mastered"&&st==="mastered";
    return `<div class="chainnode" data-move="${id}">
      <div class="rail ${railDone?"done":""}"></div>
      <div class="nodedot ${st} ${isNext?"next":""}">${STATUS_META[st].ic||""}</div>
      <div class="nodetext"><div class="zh">${esc(m.zh)}</div><div class="en">${esc(m.en)} · ${m.lvl}</div></div>
      <div class="nodetag ${isNext?"next":""}">${st==="mastered"?"已掌握":isNext?"▸ 下一站":st==="learning"?"进行中":""}</div>
    </div>`;
  }).join("");
  return `<div class="pathcard">
    <div class="pathtitle"><span class="zh">${p.zh}</span><span class="pct">${done}/${p.chain.length}</span></div>
    <div class="pathdesc">${p.desc}</div>
    <div class="chain">${nodes}</div>
  </div>`;
}

function bindTree(){
  document.querySelectorAll("[data-tv]").forEach(b=>b.onclick=()=>{treeView=b.dataset.tv;render()});
  document.querySelectorAll("[data-fs]").forEach(b=>b.onclick=()=>{filterStatus=b.dataset.fs;render()});
  document.querySelectorAll("[data-fsub]").forEach(b=>b.onclick=()=>{filterSub=b.dataset.fsub;render()});
  document.querySelectorAll("[data-fl]").forEach(b=>b.onclick=()=>{filterLvl=b.dataset.fl;render()});
  document.querySelectorAll("[data-toggle]").forEach(h=>h.onclick=()=>{
    const id=h.dataset.toggle;state.open[id]=state.open[id]===false;save();render();
  });
  document.querySelectorAll("[data-cycle]").forEach(b=>b.onclick=e=>{
    e.stopPropagation();cycleStatus(b.dataset.cycle);
  });
  document.querySelectorAll("[data-move]").forEach(r=>r.onclick=()=>openSheet(r.dataset.move));
}

// ---------------- 状态切换 ----------------
const ORDER=["none","want","learning","mastered"];
function cycleStatus(id){
  const cur=state.status[id]||"none";
  const next=ORDER[(ORDER.indexOf(cur)+1)%ORDER.length];
  setStatus(id,next);
}
function setStatus(id,st){
  const was=state.status[id]||"none";
  if(st==="none")delete state.status[id];else state.status[id]=st;
  save();
  if(st==="mastered"&&was!=="mastered")celebrate(byId[id]);
  checkBadges();
  render();
  if(curMove===id)fillSheet(id);
}

  for(let i=0;i<70;i++){
    const p=document.createElement("div");p.className="cp";
    p.style.left=50+(Math.random()*20-10)+"%";p.style.top="30%";
    p.style.background=colors[i%colors.length];
    p.style.setProperty("--dx",(Math.random()*2-1)*320+"px");

let toastTimer=null;
function toast(msg){
  const t=$("#toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
}
function checkBadges(){
  BADGES.forEach(b=>{
    if(!state.badges[b.id]&&b.test(state)){
      state.badges[b.id]=Date.now();save();
      setTimeout(()=>toast(`🏅 解锁成就「${b.nm}」`),1200);
    }
  });
}

// ---------------- 详情抽屉 ----------------
function openSheet(id){
  curMove=id;curFeel=null;fillSheet(id);
  $("#sheetmask").classList.add("show");$("#sheet").classList.add("show");
  $("#sheet").scrollTop=0;
}
function closeSheet(){
  curMove=null;
  $("#sheetmask").classList.remove("show");$("#sheet").classList.remove("show");
}
$("#sheetmask").onclick=closeSheet;

function fillSheet(id){
  const m=byId[id];const st=state.status[id]||"none";
  const logs=state.logs[id]||[];
  $("#sheetinner").innerHTML=`
  <div class="sheethead">
    <div class="toprow"><span class="lvl ${m.lvl}">${m.lvl} · ${LEVELS[m.lvl]}</span><span class="en">${esc(m.en)}</span></div>
    <h2>${esc(m.zh)}</h2>
  </div>
  <div class="statusrow">
    <button class="${st==="want"?"on-want":""}" data-set="want">○ 想学</button>
    <button class="${st==="learning"?"on-learning":""}" data-set="learning">🌙 进行中</button>
    <button class="${st==="mastered"?"on-mastered":""}" data-set="mastered">✓ 已掌握</button>
  </div>
  <div class="tut">
    <div class="tutsec"><h3><span class="bar v"></span>训练目标</h3><p>${esc(m.goal)}</p></div>
    <div class="tutsec"><h3><span class="bar"></span>动作步骤</h3><ol class="steps">${m.steps.map(s=>`<li>${esc(s)}</li>`).join("")}</ol></div>
    <div class="tutsec"><h3><span class="bar b"></span>技术要点</h3><ul class="cues">${m.cues.map(c=>`<li>${esc(c)}</li>`).join("")}</ul></div>
    <div class="tutsec"><h3><span class="bar r"></span>常见错误</h3><ul class="cues faults">${m.faults.map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div>
    <div class="tutsec"><h3><span class="bar a"></span>达标标准</h3><div class="stdbox">${m.std}</div></div>
    <div class="tutsec"><h3><span class="bar"></span>下一步</h3><p>${esc(m.next)}</p></div>
  </div>
  <div class="logsec">
    <h3>练习打卡 <span class="n">${logs.length} 次</span></h3>
    <div class="logform">
      <textarea id="lognote" placeholder="今天练了什么?例如:弹力带引体 4×6,最后一组力竭…"></textarea>
      <div class="feelrow">
        <button data-feel="😤 艰难">😤 艰难</button>
        <button data-feel="🙂 正常">🙂 正常</button>
        <button data-feel="😎 轻松">😎 轻松</button>
        <button data-feel="🚀 突破">🚀 突破</button>
      </div>
      <button class="logsave" id="logsave">记录这次练习</button>
    </div>
    <div>${logs.slice().reverse().map((l,ri)=>{
      const i=logs.length-1-ri;
      return `<div class="logitem"><span class="d">${l.d}</span><span class="t">${esc(l.t)||"完成练习"}</span><span class="f">${l.f||""}</span><button class="logdel" data-del="${i}">✕</button></div>`;
    }).join("")||'<div class="empty">还没有打卡记录<br>每一次练习都值得被记住</div>'}</div>
  </div>`;

  document.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.set;const cur=state.status[id]||"none";
    setStatus(id,cur===v?"none":v);
  });
  document.querySelectorAll("[data-feel]").forEach(b=>b.onclick=()=>{
    curFeel=curFeel===b.dataset.feel?null:b.dataset.feel;
    document.querySelectorAll("[data-feel]").forEach(x=>x.classList.toggle("on",x.dataset.feel===curFeel));
  });

    const t=$("#lognote").value.trim();
    if(!t&&!curFeel){toast("写一句感受或选个状态再保存吧");return}
    const now=new Date();
    const d=`${now.getMonth()+1}/${now.getDate()}`;
    (state.logs[id]=state.logs[id]||[]).push({d,t,f:curFeel,ts:Date.now()});
    save();toast("✓ 已记录,继续加油");checkBadges();fillSheet(id);render();
  };
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    state.logs[id].splice(+b.dataset.del,1);save();fillSheet(id);render();
  });
}

// ---------------- 记录视图 ----------------
function renderLog(){
  const entries=[];
  Object.entries(state.logs).forEach(([id,arr])=>arr.forEach(l=>entries.push({...l,id})));
  entries.sort((a,b)=>b.ts-a.ts);
  if(!entries.length){
    root.innerHTML=`<div class="empty"><div class="big">📒</div>还没有训练记录<br>去技能树里打开一个动作,记录第一次练习吧</div>`;return;
  }
  const byDay={};
  entries.forEach(e=>{
    const day=new Date(e.ts).toLocaleDateString("zh-CN",{month:"long",day:"numeric",weekday:"short"});
    (byDay[day]=byDay[day]||[]).push(e);
  });
  root.innerHTML=Object.entries(byDay).map(([day,list])=>`
    <div class="daycard"><div class="d">${day} · ${list.length} 条</div>
    ${list.map(e=>`<div class="ent"><b>${esc(byId[e.id].zh)}</b><span>${esc(e.t)||"完成练习"} ${e.f||""}</span></div>`).join("")}
    </div>`).join("");
}

// ---------------- 我的视图 ----------------
function renderMe(){
  const m=cnt(state,"mastered"),l=cnt(state,"learning"),w=cnt(state,"want"),lg=logTotal(state);
  const unlocked=BADGES.filter(b=>state.badges[b.id]).length;

    </div>`).join("")}
  </div>
  <div class="databtns">
    <button id="exportbtn">导出数据备份</button>
    <button id="importbtn">导入数据</button>
  </div>
  <input type="file" id="importfile" accept=".json" style="display:none">
  ${storageOk?"":'<p style="color:var(--amber);font-size:12px;margin-top:12px">⚠ 当前环境不支持本地存储,数据仅在本次会话内有效。请下载文件后用浏览器直接打开使用。</p>'}`;

  $("#exportbtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`skilltree-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
    toast("✓ 备份已导出");
  };
  $("#importbtn").onclick=()=>$("#importfile").click();
  $("#importfile").onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{const p=JSON.parse(r.result);
        state={...state,...p,status:p.status||{},logs:p.logs||{},badges:p.badges||{}};
        save();render();toast("✓ 数据已导入");
      }catch(err){toast("文件格式不正确,导入失败")}
    };
    r.readAsText(f);
  };
}

document.querySelectorAll(".tabbar button").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});

    else if(p[0]==="bench"){const[_,x1,x2,y]=p;props+=`<rect x="${x1}" y="${y}" width="${x2-x1}" height="9" rx="3" class="ipf"/><line x1="${x1+8}" y1="${y+9}" x2="${x1+8}" y2="130" class="ip"/><line x1="${x2-8}" y1="${y+9}" x2="${x2-8}" y2="130" class="ip"/>`}

let illusRAF=null;
function lerp(a,b,t){return a+(b-a)*t}
function lp(pa,pb,t){return[lerp(pa[0],pb[0],t),lerp(pa[1],pb[1],t)]}
function drawPose(A,B,t){
  const j={};
  ["head","sh","el","ha","hip","kn","an","toe","el2","ha2"].forEach(k=>{
    if(A[k]&&B[k])j[k]=lp(A[k],B[k],t);else if(A[k])j[k]=A[k];
  });
  const g=id=>document.getElementById(id);
  if(!g("f-head"))return false;
  g("f-head").setAttribute("cx",j.head[0]);g("f-head").setAttribute("cy",j.head[1]);
  g("f-body").setAttribute("d",`M${j.sh} L${j.hip}`);
  g("f-arm").setAttribute("d",`M${j.sh} L${j.el} L${j.ha}`);
  g("f-arm2").setAttribute("d",j.el2?`M${j.sh} L${j.el2} L${j.ha2}`:"");
  g("f-leg").setAttribute("d",`M${j.hip} L${j.kn} L${j.an} L${j.toe}`);
  g("f-grip").setAttribute("cx",j.ha[0]);g("f-grip").setAttribute("cy",j.ha[1]);
  return true;
}
function startIllus(id){
  stopIllus();
  const cfg=ILLUS[id];if(!cfg)return;
  // 残影:起始位淡描
  const ghost=document.getElementById("ghostg");
  if(ghost){
    const A=cfg.A;
    let d2=A.el2?`<path class="ifl" d="M${A.sh} L${A.el2} L${A.ha2}"/>`:"";
    ghost.innerHTML=`<circle class="ifh" cx="${A.head[0]}" cy="${A.head[1]}" r="7"/>
      <path class="ifl" d="M${A.sh} L${A.hip}"/><path class="ifl" d="M${A.sh} L${A.el} L${A.ha}"/>${d2}
      <path class="ifl" d="M${A.hip} L${A.kn} L${A.an} L${A.toe}"/>`;
  }
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches){
    drawPose(cfg.A,cfg.B,1);return;
  }
  const dur=cfg.dur,hold=420,cycle=(dur+hold)*2;
  const t0=performance.now();
  function frame(now){
    const e=(now-t0)%cycle;
    let t;
    if(e<dur)t=e/dur;
    else if(e<dur+hold)t=1;
    else if(e<dur*2+hold)t=1-(e-dur-hold)/dur;
    else t=0;
    t=(1-Math.cos(Math.PI*t))/2; // ease
    if(!drawPose(cfg.A,cfg.B,t)){illusRAF=null;return}
    illusRAF=requestAnimationFrame(frame);
  }
  illusRAF=requestAnimationFrame(frame);
}
function stopIllus(){if(illusRAF){cancelAnimationFrame(illusRAF);illusRAF=null}}

const GLOSSARY=[
["AMRAP","在规定时间内尽可能多轮/次 (As Many Rounds/Reps As Possible)"],
["EMOM","每分钟开始时做规定动作 (Every Minute On the Minute)"],
["For Time","计时完成,越快越好"],["RFT","计时完成规定轮数 (Rounds For Time)"],
["Rx / Rx'd","按处方重量与标准完成,不缩放"],["Scaled","缩放/降阶版本"],
["WOD","今日训练 (Workout of the Day)"],["Buy-in","正式计时前的入场动作"],
["Cash-out","主体完成后的收尾动作"],["Chipper","一长串动作各做一次性大量次数"],
["Couplet / Triplet","两个/三个动作的组合"],["Tabata","20秒全力+10秒休息×8轮"],
["Thruster","前蹲+借力推举的连贯动作(颈前深蹲推)"],["Clean","翻铃/上膊"],
["Power Clean","高翻"],["Squat Clean","深蹲翻"],["Jerk","挺举"],["Snatch","抓举"],
["Deadlift","硬拉"],["Front Squat","颈前深蹲"],["Back Squat","颈后深蹲"],["OHS","过头深蹲 (Overhead Squat)"],
["Push Press","借力推举"],["Push Jerk","借力挺"],["STO","肩上推到过头 (Shoulder to Overhead)"],
["Wall Ball","药球抛墙"],["KB Swing","壶铃摆动 (Kettlebell Swing)"],["DB","哑铃 (Dumbbell)"],
["Box Jump","跳箱"],["Burpee","波比跳"],["Double-Under","双摇跳绳"],["DU","双摇"],["Single-Under","单摇"],
["Pull-up","引体向上"],["C2B / Chest-to-Bar","胸触杠引体"],["T2B / Toes-to-Bar","脚触杠"],
["Muscle-up","双力臂"],["HSPU","倒立俯卧撑 (Handstand Push-up)"],["HS Walk","倒立行走"],
["Pistol","单腿深蹲"],["Lunge","弓步"],["GHD Sit-up","GHD仰卧起坐"],["Rope Climb","爬绳"],
["Row","划船机"],["Cal","卡路里(划船机/风扇车计量)"],["Run","跑步"],["Rest","休息"],
["Bodyweight","自重"],["Unbroken","不间断完成"],["Time Cap","时间上限"],
["Hero WOD","英雄纪念日训练(通常极高强度)"],["Girls WOD","经典基准训练(如 Fran/Cindy/Grace)"],
];
function annotate(en){
  const found=[];const lower=en.toLowerCase();
  GLOSSARY.forEach(([t,zh])=>{
    const key=t.split(" / ")[0].toLowerCase();
    if(lower.includes(key)&&!found.some(f=>f[0]===t))found.push([t,zh]);
  });
  return found;
}

function todayKey(){const n=new Date();return `${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()}`}
async function fetchOfficial(){
  const btn=$("#fetchwod");btn.textContent="获取中…";btn.disabled=true;
  try{
    const r=await fetch("https://r.jina.ai/https://www.crossfit.com/workout",{headers:{"Accept":"text/plain"}});
    if(!r.ok)throw new Error("HTTP "+r.status);
    let md=await r.text();
    md=md.replace(/!\[[^\]]*\]\([^)]*\)/g,"").replace(/\[([^\]]*)\]\([^)]*\)/g,"$1");
    let body=md;
    const wi=md.search(/workout of the day/i);
    if(wi>-1)body=md.slice(wi);
    const cut=body.search(/(Stimulus and Strategy|Scaling:|Post .{0,40}comments|Compare to)/i);
    let main=(cut>40?body.slice(0,cut):body).trim();
    main=main.split("\n").filter(l=>!/^(menu|search|sign in|log in|shop|games|about)/i.test(l.trim())).join("\n");
    if(main.length>1600)main=main.slice(0,1600)+"\n…";
    if(main.length<30)throw new Error("内容解析为空");
    state.wodCache[todayKey()]={en:main,zh:state.wodCache[todayKey()]?.zh||""};
    save();renderLog();toast("✓ 已获取今日官方 WOD");
  }catch(e){
    toast("获取失败:"+e.message+"(可能是网络或代理限制)");
    btn.textContent="重新获取";btn.disabled=false;
  }
}

function compressImage(file,cb){
  const img=new Image();
  img.onload=()=>{
    const max=900,sc=Math.min(1,max/Math.max(img.width,img.height));
    const cv=document.createElement("canvas");
    cv.width=img.width*sc;cv.height=img.height*sc;
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL("image/jpeg",0.72));
  };
  img.src=URL.createObjectURL(file);
}

// ---------- 硬拉与翻铃 ----------

{id:"power-clean",cat:"wl",sub:"硬拉与翻铃",lvl:"L2",zh:"高翻",en:"Power Clean",

// ---------- 推举与挺 ----------
{id:"strict-press",cat:"wl",sub:"推举与挺",lvl:"L1",zh:"实力推举",en:"Strict Press",

let curBB=false;
const _illusSVG2=illusSVG;
illusSVG=function(id){
  let s=_illusSVG2(id);
  if(ILLUS[id]&&ILLUS[id].bb){
    s=s.replace('<circle id="f-grip"',
      '<circle id="f-plate" r="11" class="ifp"/><circle id="f-axle" r="3" class="ifp2"/><circle id="f-grip"');
  }
  return s;
};
const _startIllus2=startIllus;
startIllus=function(id){
  curBB=!!(ILLUS[id]&&ILLUS[id].bb);
  _startIllus2(id);
  if(curBB){
    const gh=document.getElementById("ghostg");
    if(gh){const A=ILLUS[id].A;gh.innerHTML+=`<circle class="ifp" cx="${A.ha[0]}" cy="${A.ha[1]}" r="11"/>`}
  }
};
const _drawPose2=drawPose;
drawPose=function(A,B,t){
  const ok=_drawPose2(A,B,t);
  if(ok&&curBB){
    const p=document.getElementById("f-plate"),ax=document.getElementById("f-axle"),g=document.getElementById("f-grip");
    if(p&&g){
      const x=g.getAttribute("cx"),y=g.getAttribute("cy");
      p.setAttribute("cx",x);p.setAttribute("cy",y);
      ax.setAttribute("cx",x);ax.setAttribute("cy",y);
    }
  }
  return ok;
};

 cues:["大组数时用「身体波浪」省力:推地与跳脚连成一个波","节奏恒定 > 开局冲刺,波比跳是配速教学大师","落地即下一次的开始,消灭中间的站立犹豫"],
 faults:["塌腰摔落地面,腰椎受冲击","跳回时脚太靠后,起身费力","顶端不伸髋不击掌,偷工减料"],
 std:"<b>5 分钟内完成 50 次</b>标准波比跳。",
 next:"无器械引擎已点火,配合跳箱与药球构建完整代谢能力。"},

{id:"box-jump",cat:"mono",sub:"体能综合",lvl:"L2",zh:"跳箱",en:"Box Jump",
 goal:"下肢爆发力与落地控制的双重训练。重点不是跳多高,而是每一次都轻、稳、可重复。",
 steps:["面对箱子(标准 24/20 英寸)一小步距离站立。","摆臂下蹲蓄力,双脚同时起跳。","空中收髋提膝,双脚全掌落上箱面。","箱上完全站直(髋膝伸展),走下或跳下,跳下时屈膝缓冲。"],
 cues:["落箱要「猫一样轻」——声音越小,控制越好","视线看箱面目标点,不看脚","疲劳时改 step-down 下箱,跟腱断裂大多发生在反弹跳下"],
 faults:["落点只有前脚掌一半,脚跟悬空打滑","箱上不站直就跳下,no-rep","过度依赖反弹式连续跳,跟腱风险累积"],
 std:"标准箱高连续 <b>20 次</b>,每次箱上站直、落地轻稳。",
 next:"爆发与落地都稳了,可挑战更高箱或交替触跳。"},

{id:"walking-lunge",cat:"mono",sub:"体能综合",lvl:"L1",zh:"行走弓步",en:"Walking Lunge",
 goal:"单边下肢力量与骨盆稳定的基础动作,矫正左右失衡,是 Pistol 与负重弓步的前置。",
 steps:["站立,向前迈出一大步。","垂直下沉:后膝轻触地面(或离地一拳),前小腿垂直。","前脚跟发力站起,后腿顺势向前迈出下一步。","躯干全程直立,骨盆水平不歪斜。"],
 cues:["是「向下坐电梯」不是「向前冲刺」——重心垂直升降","步幅够大,前膝才不会冲过脚尖","推起靠前腿,后腿只是辅助"],
 faults:["步幅太小,前膝大幅前移","躯干前扑,用惯性带起身","骨盆左右摇摆,核心放假"],
 std:"连续 <b>20 步</b>(每侧 10)标准行走弓步,后膝每次轻触地。",
 next:"单边力量上路,目标单腿深蹲 Pistol。"},

{id:"pistol",cat:"mono",sub:"体能综合",lvl:"L3",zh:"单腿深蹲",en:"Pistol Squat",
 goal:"单腿全深度蹲起,另一腿前伸悬空。单边力量、踝关节活动度与平衡的三合一考题。",
 steps:["单腿站立,另一腿前伸,双臂前平举配重。","支撑腿控制下蹲,悬空腿保持离地伸直。","降至臀触小腿的全深度,短暂控制。","支撑腿脚跟踩地站起,全程悬空脚不触地。"],
 cues:["踝活动度是第一道门:脚跟踩不住就先垫小片/拉伸小腿","下得越慢越稳——离心控制是 Pistol 的一半","抓住前伸腿的脚尖(辅助版)是极好的过渡练习"],
 faults:["脚跟离地,靠脚尖摇晃硬撑","悬空腿点地借力","快速砸到底部靠反弹起身,膝盖受冲击"],
 std:"左右腿各连续 <b>5 次</b> 标准 Pistol。",
 next:"单边能力满格,可以加负重(高脚杯式 Pistol)继续进阶。"},

{id:"ghd-situp",cat:"mono",sub:"体能综合",lvl:"L2",zh:"GHD 仰卧起坐",en:"GHD Sit-up",
 goal:"在 GHD 机上的大幅度核心动作,利用髋屈肌与腹肌的全程发力,刺激远超地面卷腹——也因此必须循序渐进。",
 steps:["坐上 GHD,臀部前缘略超出坐垫,脚踝锁进滚轮。","控制后仰,身体过水平后双手向后伸触地方向。","腹肌+髋屈肌爆发收缩坐起,双手触脚踝前方的垫面。","全程速度可控,利用一点伸膝助力是合法技术。"],
 cues:["新手从「仰到水平」开始,几周后再增加后仰深度","次数要保守:首练 10–15 次,GHD 的延迟酸痛非常凶","起身时呼气,后仰时吸气"],
 faults:["第一次就大量满幅度,隔天腹肌灾难甚至横纹肌风险","后仰失控自由落体","脖子主动前甩借力"],
 std:"连续 <b>15 次</b> 全幅度 GHD sit-up,节奏可控。",
 next:"与 T2B、L-sit 组成完整核心体系。"},

{id:"farmer-carry",cat:"mono",sub:"体能综合",lvl:"L1",zh:"农夫行走",en:"Farmer Carry",
 goal:"负重行走——握力、躯干刚性与步态稳定的「最被低估的动作」。简单,但对全身的强化极其诚实。",
 steps:["两手各提一只壶铃/哑铃,硬拉式拿起。","站直:肩后收下沉,核心绷紧,身体不向任何一侧倾斜。","小步幅、稳节奏向前走,重物贴近身体两侧。","到达距离后硬拉式放下,不要弯腰甩落。"],
 cues:["想象「头顶一杯水」走路,躯干就是不动的容器","握不住就停下休息再走,不要让重物把肩拽垮","单侧版(suitcase carry)是抗侧屈核心的特效药"],
 faults:["耸肩缩脖,斜方肌代偿","身体侧倾或骨盆摇摆","步子太大太快,变成踉跄"],
 std:"双手各 <b>32/24kg</b> 行走 50 米不放下。",
 next:"试试单侧行走与过头行走,稳定挑战逐级升高。"},

// ---------- 攀爬类 ----------
{id:"rope-climb",cat:"mono",sub:"攀爬类",lvl:"L3",zh:"爬绳",en:"Rope Climb",
 goal:"借助腿部锁绳技术攀至 4.6m 顶端。技术正确时腿出大力,手臂只管换位——这是和「死拽硬上」的本质区别。",
 steps:["跳起抓绳,双腿用 J-hook(绳从一侧脚背绕过另一脚踩住)或 S-wrap 锁绳。","站腿:像踩台阶一样蹬直双腿,身体上移。","双手快速向上交替换位,重新收腿锁绳。","「锁—站—换手」循环至触顶;下降时松一格锁一格,绝不滑降。"],
 cues:["腿锁牢的瞬间,手可以完全松开——用这个标准检验锁绳质量","收腿要高,一次站起赚足距离","下降比上升更重要:控制下降保护双手和安全"],
 faults:["不锁腿纯手臂拉,两趟力竭","锁绳太松,站腿时绳滑走","滑降烧手,掌心起泡报废一周"],
 std:"完成 <b>3 次</b> 触顶爬绳(4.6m),含受控下降。",
 next:"腿锁技术圆满后,去掉腿——无腿爬绳,纯拉力的世界。"},

{id:"legless-rope-climb",cat:"mono",sub:"攀爬类",lvl:"L4",zh:"无腿爬绳",en:"Legless Rope Climb",
 goal:"全程不用腿锁绳的爬绳,纯上肢拉力 + 核心控制,Games 级别的拉力试金石。",
 steps:["跳起高位抓绳,身体呈 L 或微屈髋(降低摆动)。","单手向上换位时,另一手全力锁紧,核心刹住身体晃动。","换手节奏:小幅、快速、交替,身体贴近绳。","触顶后同样以受控交替换手下降,落地前留好缓冲。"],
 cues:["前置硬指标:严格引体 10+,且 L-sit 悬挂稳定","身体晃动是最大的力量小偷,核心全程绷死","前臂会先于背阔报警,握力训练(毛巾悬挂)提前补"],
 faults:["大幅度蹿跳式换手,脱手风险高","身体甩成钟摆,每次换手都在救险","上去了下不来——下降力量没有储备"],
 std:"完成 <b>1 次</b> 触顶无腿爬绳并受控下降。",
 next:"攀爬类登顶。L-sit 无腿爬绳是最后的炫技形态。"},

// ---------- 器械有氧 ----------
{id:"row-erg",cat:"mono",sub:"器械有氧",lvl:"L1",zh:"划船机",en:"Rowing (Erg)",
 goal:"全身参与的低冲击有氧之王。技术差的人用手臂划,技术好的人用腿划——功率差距可达 30%。",
 steps:["发力顺序:腿蹬(60%)→ 髋展(30%)→ 臂拉(10%),回程顺序完全相反。","抓水位(catch):小腿垂直、躯干前倾 1 点钟方向、手臂伸直。","蹬腿驱动,杆贴近身体直线拉至下肋。","回桨比拉桨慢(节奏 1:2),恢复就在回桨里。"],
 cues:["「腿—髋—臂,臂—髋—腿」默念顺序直到成为本能","桨频不是越快越好:20–24 s/m 练效率,28+ 比赛","盯功率(瓦数)练技术:同心率下瓦数涨 = 技术在涨"],
 faults:["开背过早,腿还没蹬完背先抡","拉到锁骨或肚脐,力线偏移","回桨时膝盖先弯,杆撞膝盖"],
 std:"<b>2000 米</b> 男 8:00 / 女 9:00 内完成,全程动作顺序正确。",
 next:"划船经济性建立后,风扇车的全身输出会顺滑很多。"},

{id:"assault-bike",cat:"mono",sub:"器械有氧",lvl:"L2",zh:"风扇车",en:"Assault Bike",
 goal:"风阻无上限的全身自行车——你输出多少它反馈多少,公认「最诚实也最痛苦」的体能器械。",
 steps:["调座高:脚踏最低点时膝盖微弯约 25–35°。","手脚同步:同侧推拉协调,全身参与而非只用腿。","校准节奏:找到能维持的目标 RPM,锁住它。","间歇训练为主:如 10 × 30 秒冲刺 / 60 秒慢踩。"],
 cues:["「风扇车没有惯性帮忙」——停止发力立刻掉速,分配比爆发重要","手臂推拉真实出力,能分担腿部 20% 负荷","冲刺段身体稳定别乱晃,晃动全是漏掉的瓦数"],
 faults:["开局猛冲 10 秒,随后断崖崩盘","只用腿踩,手臂搭着当扶手","座位过低,膝关节夹角过小磨损"],
 std:"<b>10 分钟</b>内骑出 男 60 / 女 45 卡路里。",
 next:"引擎容量达标。Echo bike 间歇是顶级体能的日常餐。"},

{id:"running",cat:"mono",sub:"器械有氧",lvl:"L1",zh:"跑步技术",en:"Running",
 goal:"最古老的体能动作也有技术:好的跑姿省下的能量,在 Murph 后半程就是生死线。",
 steps:["姿态:身体从脚踝开始微前倾(不是弯腰),头颈中立。","落地:前脚掌/全掌在重心正下方落地,避免跨大步脚跟刹车。","步频:目标 170–180 步/分,小步快频。","摆臂:手肘约 90°,前后摆不过中线,带动节奏。"],
 cues:["「提脚」而不是「蹬地」——想着把脚跟拉向臀部","用节拍器 App 校 180 步频,一周就能内化","上坡缩步幅保持步频,下坡控制不刹车"],
 faults:["大跨步脚跟着地,每步都在踩刹车","坐着跑:髋后坐,蹬伸不充分","耸肩握拳,上半身僵硬耗能"],
 std:"<b>1600 米</b> 男 7:30 / 女 8:30 内完成,步频 ≥170。",
 next:"配合划船与风扇车,三大引擎全部在线。"},

let CURIMPL=false;
drawPose=function(A,B,t){
  const j={};
  ["head","sh","el","ha","el2","ha2","hip","kn","an","toe","kn2","an2","toe2"].forEach(k=>{
    if(A[k]&&B[k])j[k]=lp(A[k],B[k],t);else if(A[k])j[k]=A[k];
  });
  const g=id=>document.getElementById(id);
  if(!g("f-head"))return false;
  g("f-head").setAttribute("cx",j.head[0]);g("f-head").setAttribute("cy",j.head[1]);
  g("f-body").setAttribute("d",`M${j.sh} L${j.hip}`);
  g("f-arm").setAttribute("d",`M${j.sh} L${j.el} L${j.ha}`);
  g("f-arm2").setAttribute("d",j.el2?`M${j.sh} L${j.el2} L${j.ha2}`:"");
  g("f-leg").setAttribute("d",`M${j.hip} L${j.kn} L${j.an} L${j.toe}`);
  g("f-leg2").setAttribute("d",j.kn2?`M${j.hip} L${j.kn2} L${j.an2} L${j.toe2}`:"");
  g("f-grip").setAttribute("cx",j.ha[0]);g("f-grip").setAttribute("cy",j.ha[1]);
  if(CURIMPL){
    const p=g("f-plate"),ax=g("f-axle");
    if(p){p.setAttribute("cx",j.ha[0]);p.setAttribute("cy",j.ha[1])}
    if(ax){ax.setAttribute("cx",j.ha[0]);ax.setAttribute("cy",j.ha[1])}
  }
  return true;
};

startIllus=function(id){
  stopIllus();
  const cfg=ILLUS[id];if(!cfg)return;
  CURIMPL=!!(cfg.bb||cfg.kb||cfg.ball);
  const ghost=document.getElementById("ghostg");
  if(ghost){
    const A=cfg.A;
    let g2=A.el2?`<path class="ifl" d="M${A.sh} L${A.el2} L${A.ha2}"/>`:"";
    let l2=A.kn2?`<path class="ifl" d="M${A.hip} L${A.kn2} L${A.an2} L${A.toe2}"/>`:"";
    let gi=cfg.bb?`<circle class="ifp" cx="${A.ha[0]}" cy="${A.ha[1]}" r="11"/>`
          :cfg.kb?`<circle class="ifk" cx="${A.ha[0]}" cy="${A.ha[1]}" r="7"/>`
          :cfg.ball?`<circle class="ifb" cx="${A.ha[0]}" cy="${A.ha[1]}" r="8"/>`:"";
    ghost.innerHTML=`<circle class="ifh" cx="${A.head[0]}" cy="${A.head[1]}" r="7"/>
      <path class="ifl" d="M${A.sh} L${A.hip}"/><path class="ifl" d="M${A.sh} L${A.el} L${A.ha}"/>${g2}
      <path class="ifl" d="M${A.hip} L${A.kn} L${A.an} L${A.toe}"/>${l2}${gi}`;
  }
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches){
    drawPose(cfg.A,cfg.B,1);return;
  }
  const dur=cfg.dur,hold=420,cycle=(dur+hold)*2;
  const t0=performance.now();
  function frame(now){
    const e=(now-t0)%cycle;
    let t;
    if(e<dur)t=e/dur;
    else if(e<dur+hold)t=1;
    else if(e<dur*2+hold)t=1-(e-dur-hold)/dur;
    else t=0;
    t=(1-Math.cos(Math.PI*t))/2;
    if(!drawPose(cfg.A,cfg.B,t)){illusRAF=null;return}
    illusRAF=requestAnimationFrame(frame);
  }
  illusRAF=requestAnimationFrame(frame);
};

visibleMoves=function(){
  const q=searchQ.trim().toLowerCase();
  return ALL.filter(m=>{
    const st=state.status[m.id]||"none";
    if(filterStatus!=="all"&&st!==filterStatus)return false;
    if(filterSub!=="all"&&m.sub!==filterSub)return false;
    if(filterLvl!=="all"&&m.lvl!==filterLvl)return false;
    if(q&&!(m.zh.toLowerCase().includes(q)||m.en.toLowerCase().includes(q)))return false;
    return true;
  });
};

// 连续训练天数 + 存储用量
function calcStreak(){
  const days=new Set();
  Object.values(state.logs).forEach(a=>a.forEach(l=>days.add(new Date(l.ts).toDateString())));
  (state.wods||[]).forEach(w=>days.add(new Date(w.ts).toDateString()));
  let streak=0;const d=new Date();
  if(!days.has(d.toDateString()))d.setDate(d.getDate()-1);
  while(days.has(d.toDateString())){streak++;d.setDate(d.getDate()-1)}
  return{streak,total:days.size};
}
const _rm5=renderMe;
renderMe=function(){
  _rm5();

  const{streak,total}=calcStreak();
  if(grid)grid.insertAdjacentHTML("beforeend",
    `<div class="statbox"><div class="v" style="color:var(--rose)">${streak}<span class="vu">天</span></div><div class="k">连续训练</div></div>

};

// ---------- 引擎 v4 ----------
const animCtl={playing:true,speed:1,trail:true};
startIllus=function(id){
  stopIllus();
  const cfg=ILLUS[id];if(!cfg)return;
  // 道具标记(供 drawPose 链使用)
  CURIMPL=!!(cfg.bb||cfg.kb||cfg.ball);
  CURDB=!!cfg.db;
  // 统一时间轴:无 seq 的旧动作转两帧序列
  const frames=cfg.seq||[
    {p:cfg.A,d:cfg.dur,label:"",hold:420},
    {p:cfg.B,d:cfg.dur,label:"",hold:420,ease:"inout"},
  ];
  const mode=cfg.mode||(cfg.seq?"loop":"loop");
  // 展开为片段 [{from,to,d,ease,label,hold}]
  const segs=[];
  const n=frames.length;
  if(mode==="pingpong"){
    for(let i=1;i<n;i++)segs.push({from:frames[i-1].p,to:frames[i].p,d:frames[i].d,ease:frames[i].ease,label:frames[i].label,hold:frames[i].hold||0});
    for(let i=n-2;i>=0;i--)segs.push({from:frames[i+1].p,to:frames[i].p,d:frames[i+1].d,ease:frames[i+1].ease,label:frames[i+1].label,hold:frames[i].hold||0});
  }else{
    for(let i=1;i<n;i++)segs.push({from:frames[i-1].p,to:frames[i].p,d:frames[i].d,ease:frames[i].ease,label:frames[i].label,hold:frames[i].hold||0});
    segs.push({from:frames[n-1].p,to:frames[0].p,d:frames[0].d,ease:frames[0].ease,label:frames[0].label,hold:frames[0].hold||0});
  }
  const cycle=segs.reduce((a,s)=>a+s.d+s.hold,0);
  // 残影:首帧
  const ghost=document.getElementById("ghostg");
  if(ghost){
    const A=frames[0].p;
    let g2=A.el2?`<path class="ifl" d="M${A.sh} L${A.el2} L${A.ha2}"/>`:"";
    let l2=A.kn2?`<path class="ifl" d="M${A.hip} L${A.kn2} L${A.an2} L${A.toe2}"/>`:"";
    let gi=cfg.bb?`<circle class="ifp" cx="${A.ha[0]}" cy="${A.ha[1]}" r="11"/>`
          :cfg.kb?`<circle class="ifk" cx="${A.ha[0]}" cy="${A.ha[1]}" r="7"/>`
          :cfg.ball?`<circle class="ifb" cx="${A.ha[0]}" cy="${A.ha[1]}" r="8"/>`
          :cfg.db?`<rect class="ifd" x="${A.ha[0]-8.5}" y="${A.ha[1]-3.5}" width="17" height="7" rx="3"/>`:"";
    ghost.innerHTML=`<circle class="ifh" cx="${A.head[0]}" cy="${A.head[1]}" r="7"/>
      <path class="ifl" d="M${A.sh} L${A.hip}"/><path class="ifl" d="M${A.sh} L${A.el} L${A.ha}"/>${g2}
      <path class="ifl" d="M${A.hip} L${A.kn} L${A.an} L${A.toe}"/>${l2}${gi}`;
  }
  const EASE={
    in:t=>t*t,
    out:t=>1-(1-t)*(1-t),
    inout:t=>(1-Math.cos(Math.PI*t))/2,
  };
  const phaseEl=document.getElementById("ic-phase");
  const trailEl=document.getElementById("f-trail");
  const hasImpl=CURIMPL||CURDB;
  let trailPts=[],lastVt=-1;
  // 控制绑定
  const pb=document.getElementById("ic-play");
  if(pb)pb.onclick=()=>{animCtl.playing=!animCtl.playing;pb.textContent=animCtl.playing?"⏸":"▶"};
  const spb=document.getElementById("ic-speed");
  if(spb)spb.onclick=()=>{animCtl.speed=animCtl.speed===1?0.4:1;spb.textContent=animCtl.speed===1?"1×":"慢"};
  const tb=document.getElementById("ic-trail");
  if(tb)tb.onclick=()=>{animCtl.trail=!animCtl.trail;tb.classList.toggle("on",animCtl.trail);
    if(!animCtl.trail&&trailEl){trailPts=[];trailEl.setAttribute("d","")}};
  // 减弱动效:静态显示末关键帧
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches){
    drawPose(frames[0].p,frames[n-1].p,1);
    if(phaseEl)phaseEl.textContent=frames[n-1].label||"";
    return;
  }
  let vt=0,lastNow=performance.now(),curLabel=null;
  function frame(now){
    const dt=Math.min(now-lastNow,100);lastNow=now;
    if(animCtl.playing)vt+=dt*animCtl.speed;
    const e=vt%cycle;
    if(e<lastVt){trailPts=[]}// 新循环清轨迹
    lastVt=e;
    // 定位片段
    let acc=0,seg=segs[0],t=0,inHold=false;
    for(const s of segs){
      if(e<acc+s.d){seg=s;t=(e-acc)/s.d;break}
      acc+=s.d;
      if(e<acc+s.hold){seg=s;t=1;inHold=true;break}
      acc+=s.hold;
    }
    const ease=EASE[seg.ease||"inout"]||EASE.inout;
    if(!drawPose(seg.from,seg.to,ease(t))){illusRAF=null;return}
    // 阶段标签
    if(phaseEl&&seg.label!==curLabel){curLabel=seg.label;phaseEl.textContent=seg.label||""}
    // 器械轨迹
    if(hasImpl&&animCtl.trail&&trailEl&&animCtl.playing&&!inHold){
      const g=document.getElementById("f-grip");
      if(g){
        trailPts.push([+g.getAttribute("cx"),+g.getAttribute("cy")]);
        if(trailPts.length>240)trailPts.shift();
        if(trailPts.length>1)trailEl.setAttribute("d","M"+trailPts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L"));
      }
    }
    illusRAF=requestAnimationFrame(frame);
  }
  illusRAF=requestAnimationFrame(frame);
};

const CKEY="cf-skilltree-cloud", LMKEY="cf-skilltree-localmode";
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k)}catch(e){}}
let cloud=null;
try{cloud=JSON.parse(lsGet(CKEY)||"null")}catch(e){}
let cloudSha=null,pushTimer=null,syncState=(cloud&&cloud.token)?"idle":"local",syncTime=null;

function cloudOn(){return !!(cloud&&cloud.token&&cloud.owner&&cloud.repo)}
function ghHeaders(){return{Authorization:"Bearer "+cloud.token,Accept:"application/vnd.github+json"}}
function ghUrl(){return`https://api.github.com/repos/${cloud.owner}/${cloud.repo}/contents/${cloud.path||"data.json"}`}
function b64e(s){return btoa(unescape(encodeURIComponent(s)))}
function b64d(s){return decodeURIComponent(escape(atob(String(s).replace(/\s/g,""))))}

function setSync(st,msg){
  syncState=st;if(st==="ok")syncTime=new Date();
  const chip=document.getElementById("syncchip");
  if(chip){
    const map={local:["○ 本地模式","var(--faint)"],idle:["· 待同步","var(--dim)"],
      syncing:["⟳ 同步中…","var(--blue)"],ok:["✓ 已同步 "+(syncTime?syncTime.toTimeString().slice(0,5):""),"var(--green)"],
      err:["⚠ "+(msg||"同步失败"),"var(--amber)"]};
    const[t,c]=map[st]||map.idle;chip.textContent=t;chip.style.color=c;
  }
  const ms=document.getElementById("mysync");if(ms)renderSyncCard();
}

async function cloudPull(force){
  if(!cloudOn())return;
  setSync("syncing");
  try{
    const r=await fetch(ghUrl()+"?ref="+(cloud.branch||"main"),{headers:ghHeaders()});
    if(r.status===404){cloudSha=null;setSync("idle");return null}
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();cloudSha=d.sha;
    const remote=JSON.parse(b64d(d.content));
    if(force||(remote._ts||0)>(state._ts||0)){
      const localPhotos={};(state.wods||[]).forEach(w=>{if(w.photo)localPhotos[w.ts]=w.photo});
      state=Object.assign({},state,remote);
      state.status=remote.status||{};state.logs=remote.logs||{};
      state.badges=remote.badges||{};state.wods=remote.wods||[];
      state.wodCache=remote.wodCache||{};
      (state.wods||[]).forEach(w=>{if(!w.photo&&localPhotos[w.ts])w.photo=localPhotos[w.ts]});
      lsSet(KEY,JSON.stringify(state))
      render();
      toast("✓ 已从云端拉取最新数据");
    }
    setSync("ok");return remote;
  }catch(e){setSync("err",e.message);throw e}
}

async function cloudPush(){
  if(!cloudOn())return;
  setSync("syncing");
  try{
    state._ts=Date.now();
    lsSet(KEY,JSON.stringify(state))
    let body=state;
    if(!cloud.syncPhotos){
      body=JSON.parse(JSON.stringify(state));
      (body.wods||[]).forEach(w=>{delete w.photo});
    }
    const content=b64e(JSON.stringify(body));
    const doPut=()=>fetch(ghUrl(),{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),
      body:JSON.stringify(Object.assign({message:"skilltree sync "+new Date().toISOString(),
        content,branch:cloud.branch||"main"},cloudSha?{sha:cloudSha}:{}))});
    let r=await doPut();
    if(r.status===409||r.status===422){
      const g=await fetch(ghUrl()+"?ref="+(cloud.branch||"main"),{headers:ghHeaders()});
      if(g.ok){cloudSha=(await g.json()).sha;r=await doPut()}
    }
    if(!r.ok)throw new Error("HTTP "+r.status);
    cloudSha=(await r.json()).content.sha;
    setSync("ok");
  }catch(e){setSync("err",e.message)}
}
function schedulePush(){
  if(!cloudOn())return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>cloudPush(),4000);
}

// 覆盖 ext8 的 token 直连方案。cloud = {server,user,token(会话票据),exp,syncPhotos}
// 部署者在下方填入自己的 Worker 地址后,登录页不再显示服务器输入框
const DEFAULT_SERVER="https://green-union-9e8a.brandon199459.workers.dev"; // 例如 "https://skilltree.yourname.workers.dev"

cloudOn=function(){return !!(cloud&&cloud.server&&cloud.token&&(!cloud.exp||Date.now()<cloud.exp))}

cloudPull=async function(force){
  if(!cloudOn())return;
  setSync("syncing");
  try{
    const r=await fetch(cloud.server.replace(/\/$/,"")+"/data",{headers:{Authorization:"Bearer "+cloud.token}});
    if(r.status===401){sessionExpired();return}
    if(!r.ok)throw new Error("HTTP "+r.status);
    const{data:remote}=await r.json();
    if(remote===null){setSync("idle");return null}
    if(force||(remote._ts||0)>(state._ts||0)){
      const localPhotos={};(state.wods||[]).forEach(w=>{if(w.photo)localPhotos[w.ts]=w.photo});
      state=Object.assign({},state,remote);
      state.status=remote.status||{};state.logs=remote.logs||{};
      state.badges=remote.badges||{};state.wods=remote.wods||[];
      state.wodCache=remote.wodCache||{};
      (state.wods||[]).forEach(w=>{if(!w.photo&&localPhotos[w.ts])w.photo=localPhotos[w.ts]});
      lsSet(KEY,JSON.stringify(state));
      render();
      toast("✓ 已从云端拉取最新数据");
    }
    setSync("ok");return remote;
  }catch(e){setSync("err",e.message);throw e}
};

cloudPush=async function(){
  if(!cloudOn())return;
  setSync("syncing");
  try{
    state._ts=Date.now();
    lsSet(KEY,JSON.stringify(state));
    let body=state;
    if(!cloud.syncPhotos){
      body=JSON.parse(JSON.stringify(state));
      (body.wods||[]).forEach(w=>{delete w.photo});
    }
    const r=await fetch(cloud.server.replace(/\/$/,"")+"/data",{
      method:"PUT",headers:{Authorization:"Bearer "+cloud.token,"Content-Type":"application/json"},
      body:JSON.stringify(body)});
    if(r.status===401){sessionExpired();return}
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||"HTTP "+r.status)}
    setSync("ok");
  }catch(e){setSync("err",e.message)}
};

function sessionExpired(){
  setSync("err","会话过期,请重新登录");
  cloud.token=null;lsSet(CKEY,JSON.stringify(cloud));
  showLogin(true);
}

function isBlockedPage(t){
  return /could not be satisfied|Generated by cloudfront|403 ERROR|Request blocked/i.test(t||"");
}
function extractWod(raw){
  let body=raw;
  const wi=raw.search(/workout of the day/i);
  if(wi>-1)body=raw.slice(wi);
  else{
    const di=raw.search(/\b2\d{5}\b/); // 日期码如 260611
    if(di>-1)body=raw.slice(Math.max(0,di-30));
  }
  const cut=body.search(/(Stimulus and Strategy|Scaling:|Scaling Options|Post .{0,50}comments|Compare to|Resources:)/i);
  let main=(cut>40?body.slice(0,cut):body).trim();
  main=main.split("\n").filter(l=>{
    const s=l.trim();
    return s&&!/^(menu|search|sign in|log in|shop|games|open|learn|courses|find a gym|about|careers|follow|©|cookie)/i.test(s);
  }).join("\n");
  if(main.length>1600)main=main.slice(0,1600)+"\n…";
  return main;
}

fetchOfficial=async function(){
  const btn=$("#fetchwod");
  if(btn){btn.textContent="获取中…";btn.disabled=true}
  let raw=null,lastErr=null;
  // 通道1:自家 Worker
  if(cloud&&cloud.server){
    try{
      const r=await fetch(cloud.server.replace(/\/$/,"")+"/wod");
      const d=await r.json().catch(()=>({}));
      if(!r.ok||d.error)throw new Error(d.error||"HTTP "+r.status);
      if(isBlockedPage(d.text))throw new Error("源站拒绝访问");
      raw=d.text;
    }catch(e){lastErr=e}
  }
  // 通道2:jina 阅读代理
  if(!raw){
    try{
      const r=await fetch("https://r.jina.ai/https://www.crossfit.com/workout",{headers:{Accept:"text/plain"}});
      if(!r.ok)throw new Error("HTTP "+r.status);
      let md=await r.text();
      if(isBlockedPage(md))throw new Error("源站拒绝代理访问(403)");
      md=md.replace(/!\[[^\]]*\]\([^)]*\)/g,"").replace(/\[([^\]]*)\]\([^)]*\)/g,"$1");
      raw=md;
    }catch(e){lastErr=lastErr||e}
  }
  if(raw){
    const main=extractWod(raw);
    if(main.length>=30){
      state.wodCache[todayKey()]={en:main,zh:state.wodCache[todayKey()]?.zh||""};
      save();renderLog();toast("✓ 已获取今日官方 WOD");
      return;
    }
    lastErr=new Error("内容解析为空");
  }
  toast("获取失败:"+(lastErr?lastErr.message:"未知错误"));
  if(btn){btn.textContent="重新获取";btn.disabled=false}
  const card=$("#fetchwod")?.closest(".pathcard");
  if(card&&!card.querySelector(".wodfail")){
    card.insertAdjacentHTML("beforeend",
      `<div class="wodfail" style="font-size:12px;color:var(--amber);line-height:1.8;margin-top:10px">两条抓取通道均失败${cloud&&cloud.server?"":"(登录后会启用更稳定的服务器直连通道)"}。也可以打开 crossfit.com/workout 把内容粘到下方 WOD 表单,术语对照同样生效。</div>`);
  }
};

// 启动清理:如果之前缓存进了 CloudFront 错误页,清掉
(function(){
  const c=state.wodCache&&state.wodCache[todayKey()];
  if(c&&isBlockedPage(c.en)){delete state.wodCache[todayKey()];try{lsSet(KEY,JSON.stringify(state))}catch(e){}}
})();

// 初始重渲染以应用扩展
render();
</script>
